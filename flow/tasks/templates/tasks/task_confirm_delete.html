{% extends 'tasks/base.html' %}
{% block title %}Excluir Tarefa{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4 text-center">
            <i class="bi bi-exclamation-triangle-fill text-danger fs-1 mb-3"></i>
            <h4 class="fw-bold">Excluir "{{ task.title }}"?</h4>
            <p class="text-muted">Todos os comentários e histórico desta tarefa serão apagados.</p>
            <form method="POST" class="d-flex gap-2 justify-content-center mt-3">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">
                    <i class="bi bi-trash"></i> Sim, excluir
                </button>
                <a href="{% url 'task_detail' task.pk %}" class="btn btn-outline-secondary">Cancelar</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
